version: 0.2

phases:
  pre_build:
    commands:
      - echo "Installing backend dependencies..."
      - pip install --upgrade pip setuptools wheel
      - pip install -r backend/requirements.txt --cache-dir ~/.cache/pip
      - echo "Backend dependencies installed"
      
  build:
    commands:
      - echo "Backend is ready for deployment"
      - echo "Frontend will be built on Elastic Beanstalk"
      - echo "Build phase complete"
      
  post_build:
    commands:
      - echo "Artifact preparation complete"

artifacts:
  files:
    - '**/*'
    - '.ebextensions/**/*'
    - 'backend/**/*'
    - 'frontend/.next/**/*'
    - 'frontend/public/**/*'
    - 'frontend/node_modules/**/*'
  name: BankingAPKDetector-build
  
cache:
  paths:
    - '/root/.cache/pip/**/*'
    - 'frontend/node_modules/**/*'

env:
  variables:
    NODE_ENV: production
    PYTHONUNBUFFERED: true
    
log-group-name: /aws/codebuild/banking-apk-detector
log-stream-name: build-log
